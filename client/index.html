<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>CakeZake Orders</title>

    <!-- PWA -->
    <meta name="application-name" content="CakeZake Orders" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="CakeZake" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#ff2d55" />
    <meta name="description" content="CakeZake Order Management System" />

    <link rel="icon" type="image/svg+xml" href="/cake.svg" />
    <link rel="apple-touch-icon" href="/cake.svg" />

    <!-- Splash screen color while loading -->
    <style>
      html, body { margin: 0; padding: 0; background: #fff; }
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #ffffff;
        gap: 24px;
        transition: opacity 0.4s ease;
      }
      #splash.hidden { opacity: 0; pointer-events: none; }
      .splash-logo {
        width: 88px; height: 88px;
        border-radius: 22px;
        background: #ff2d55;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 8px 32px rgba(255,45,85,0.3);
        animation: pop 0.5s cubic-bezier(0.175,0.885,0.32,1.275) both;
      }
      @keyframes pop {
        from { transform: scale(0.6); opacity: 0; }
        to   { transform: scale(1);   opacity: 1; }
      }
      .splash-logo svg { width: 56px; height: 56px; }
      .splash-title {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 22px; font-weight: 700; color: #111;
        letter-spacing: -0.5px;
        animation: fadeup 0.5s 0.15s ease both;
      }
      .splash-sub {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 13px; color: #aaa; margin-top: -18px;
        animation: fadeup 0.5s 0.25s ease both;
      }
      @keyframes fadeup {
        from { transform: translateY(10px); opacity: 0; }
        to   { transform: translateY(0);    opacity: 1; }
      }
      /* Spinner */
      .splash-spinner {
        width: 40px; height: 40px;
        border: 3px solid #ffe0e8;
        border-top-color: #ff2d55;
        border-radius: 50%;
        animation: spin 0.8s linear infinite, fadeup 0.5s 0.35s ease both;
        opacity: 0;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <!-- Native splash shown before React loads -->
    <div id="splash">
      <div class="splash-logo">
        <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
          <rect width="512" height="512" rx="100" fill="#ff2d55"/>
          <rect x="238" y="60" width="36" height="80" rx="8" fill="rgba(255,255,255,0.3)"/>
          <ellipse cx="256" cy="58" rx="10" ry="16" fill="#FFD700"/>
          <rect x="136" y="160" width="240" height="80" rx="16" fill="#fff"/>
          <rect x="136" y="160" width="240" height="20" rx="10" fill="#ffb3c6"/>
          <rect x="80" y="260" width="352" height="110" rx="16" fill="#fff"/>
          <rect x="80" y="260" width="352" height="24" rx="10" fill="#ff6b91"/>
          <ellipse cx="256" cy="375" rx="196" ry="20" fill="#ffb3c6"/>
          <circle cx="180" cy="310" r="10" fill="#ff2d55"/>
          <circle cx="256" cy="310" r="10" fill="#ff2d55"/>
          <circle cx="332" cy="310" r="10" fill="#ff2d55"/>
          <circle cx="218" cy="340" r="7" fill="#ffb3c6"/>
          <circle cx="294" cy="340" r="7" fill="#ffb3c6"/>
        </svg>
      </div>
      <div class="splash-title">CakeZake</div>
      <div class="splash-sub">Order Management</div>
      <div class="splash-spinner"></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Hide splash once React renders root content
      const splash = document.getElementById('splash');
      const observer = new MutationObserver(() => {
        if (document.getElementById('root').children.length > 0) {
          splash.classList.add('hidden');
          setTimeout(() => splash.remove(), 450);
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
    </script>
  </body>
</html>
